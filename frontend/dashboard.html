<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PO Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="./dashboard.html">PO System</a>
        <div class="ms-auto d-flex gap-2">
          <a class="btn btn-outline-primary" id="btnLogin" href="#">Login with Google</a>
          <button class="btn btn-outline-secondary d-none" id="btnLogout" type="button">Logout</button>
          <a class="btn btn-primary" href="./create-po.html">Create PO</a>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3 mb-3">
        <div>
          <h1 class="h4 mb-1">Dashboard</h1>
          <div class="muted">All purchase orders (latest first)</div>
        </div>
        <div class="d-flex gap-2">
          <button id="btnRefresh" class="btn btn-outline-secondary">Refresh</button>
        </div>
      </div>

      <div class="alert alert-danger d-none" id="errorBox"></div>
      <div class="alert alert-info d-none" id="infoBox"></div>

      <div class="card">
        <div class="card-body">
          <div class="table-responsive">
            <table class="table align-middle mb-0">
              <thead>
                <tr>
                  <th>Ref</th>
                  <th>Created</th>
                  <th>Vendor</th>
                  <th>Status</th>
                  <th class="text-end">Subtotal</th>
                  <th class="text-end">Tax</th>
                  <th class="text-end">Total</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody id="poTbody">
                <tr>
                  <td colspan="8" class="text-center muted py-4" id="loadingRow">Loading…</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <div class="modal fade" id="poModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="poModalTitle">PO Details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="alert alert-danger d-none" id="poModalError"></div>
            <div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-3">
              <div>
                <div class="muted">Vendor</div>
                <div class="fw-semibold" id="poVendorName">—</div>
                <div class="muted small" id="poVendorMeta"></div>
              </div>
              <div class="text-md-end">
                <div class="muted">Totals</div>
                <div class="mono">
                  <div>Subtotal: <span id="poSubtotal">—</span></div>
                  <div>Tax: <span id="poTax">—</span></div>
                  <div class="fw-semibold">Total: <span id="poTotal">—</span></div>
                </div>
              </div>
            </div>
            <div class="table-responsive">
              <table class="table table-sm align-middle">
                <thead>
                  <tr>
                    <th>Product</th>
                    <th class="text-end">Unit Price</th>
                    <th class="text-end">Qty</th>
                    <th class="text-end">Line Total</th>
                  </tr>
                </thead>
                <tbody id="poItemsTbody"></tbody>
              </table>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/api.js"></script>
    <script src="./dashboard.js"></script>
  </body>
</html>
