<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Purchase Order</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="./dashboard.html">PO System</a>
        <div class="ms-auto d-flex gap-2">
          <a class="btn btn-outline-primary" id="btnLogin" href="#">Login with Google</a>
          <button class="btn btn-outline-secondary d-none" id="btnLogout" type="button">Logout</button>
          <a class="btn btn-outline-secondary" href="./dashboard.html">Dashboard</a>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3 mb-3">
        <div>
          <h1 class="h4 mb-1">Create Purchase Order</h1>
          <div class="muted">Pick a vendor, add products, and submit.</div>
        </div>
      </div>

      <div class="alert alert-danger d-none" id="errorBox"></div>
      <div class="alert alert-success d-none" id="successBox"></div>
      <div class="alert alert-info d-none" id="infoBox"></div>

      <div class="row g-3">
        <div class="col-lg-8">
          <div class="card">
            <div class="card-body">
              <form id="poForm">
                <div class="row g-3 mb-3">
                  <div class="col-md-6">
                    <label class="form-label">Vendor</label>
                    <select class="form-select" id="vendorSelect" required>
                      <option value="">Loading…</option>
                    </select>
                  </div>
                </div>

                <div class="d-flex align-items-center justify-content-between mb-2">
                  <div class="fw-semibold">Items</div>
                  <button type="button" id="btnAddRow" class="btn btn-outline-primary btn-sm">
                    + Add row
                  </button>
                </div>

                <div class="table-responsive">
                  <table class="table align-middle">
                    <thead>
                      <tr>
                        <th style="min-width: 260px">Product</th>
                        <th class="text-end" style="min-width: 110px">Unit Price</th>
                        <th class="text-end" style="min-width: 110px">Quantity</th>
                        <th class="text-end" style="min-width: 120px">Line Total</th>
                        <th class="text-end" style="width: 1%"></th>
                      </tr>
                    </thead>
                    <tbody id="itemsTbody"></tbody>
                  </table>
                </div>

                <div class="d-flex gap-2 justify-content-end">
                  <button type="submit" id="btnSubmit" class="btn btn-primary">Create PO</button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="card sticky-summary">
            <div class="card-body">
              <div class="d-flex justify-content-between mb-2">
                <div class="muted">Subtotal</div>
                <div class="mono" id="subtotalText">0.00</div>
              </div>
              <div class="d-flex justify-content-between mb-2">
                <div class="muted">Tax (5%)</div>
                <div class="mono" id="taxText">0.00</div>
              </div>
              <hr />
              <div class="d-flex justify-content-between">
                <div class="fw-semibold">Total</div>
                <div class="mono fw-semibold" id="totalText">0.00</div>
              </div>
              <div class="muted small mt-2">
                Totals are calculated client-side for preview. Final totals are stored by the backend.
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <template id="rowTemplate">
      <tr>
        <td>
          <select class="form-select form-select-sm product-select" required>
            <option value="">Select product…</option>
          </select>
        </td>
        <td class="text-end">
          <input class="form-control form-control-sm text-end unit-price" type="text" readonly value="0.00" />
        </td>
        <td class="text-end">
          <input class="form-control form-control-sm text-end qty" type="number" min="1" step="1" value="1" required />
        </td>
        <td class="text-end mono fw-semibold line-total">0.00</td>
        <td class="text-end">
          <button type="button" class="btn btn-outline-primary btn-sm btn-icon gen-desc" title="Generate Description">
            AI
          </button>
          <button type="button" class="btn btn-outline-danger btn-sm btn-icon remove-row" title="Remove">
            &times;
          </button>
        </td>
      </tr>
    </template>

    <div class="modal fade" id="descModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="descModalTitle">Generated Description</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="alert alert-danger d-none" id="descModalError"></div>
            <div class="muted small mb-2" id="descProductName"></div>
            <pre class="mb-0" style="white-space: pre-wrap" id="descText"></pre>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/api.js"></script>
    <script src="./create-po.js"></script>
  </body>
</html>
